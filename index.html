<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
}

/* 整個手機畫面 */
.phone{

    position:relative;

    width:1170px;
    height:2532px;

    margin:auto;
}

/* 背景圖 */
.bg{

    position:absolute;

    width:1170px;
    height:2532px;

    top:0;
    left:0;
}

/* 搜尋框 */
.search{
    position:absolute;

    top:850px;
    left:200px;

    width:680px;
    height:80px;

    font-size:44px;

    border:none;
    outline:none;
    background:transparent;

    color:#202124;
    caret-color:#202124;

    font-family:Arial,sans-serif;
}

</style>
</head>

<body>

<div class="phone">

<img src="giigle.png" class="bg">

<form action="result.html">

<input
class="search"
type="text"
value="カオソーイチョコ"
autofocus>

</form>

</div>

</body>
</html>
