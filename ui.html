<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
html, body{
    margin:0;
    padding:0;
    background:white;
}

/* 整個頁面 */
.page{
    position:relative;
    width:100vw;
    max-width:390px;
    margin:0 auto;
}

/* 背景圖 */
.bg{
    width:100%;
    display:block;
}

/* 第二個搜尋結果點擊區域 */
.link{
    position:absolute;

    top:56%;
    left:2%;
    width:98%;
    height:6.1%;

    display:block;
    border-radius:12px;
}

.link:active{
    background:rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<div class="page">
    <img src="ui.png" class="bg">
    <a href="choco.html" class="link"></a>
</div>

</body>
</html>
